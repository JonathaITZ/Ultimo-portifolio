        <!-- Lado Direito: Textos e Animação -->
        <div class="w-full lg:w-2/5 text-left flex flex-col">
            <h1 id="project-title" class="text-3xl sm:text-4xl lg:text-6xl font-extrabold tracking-tight mb-4 lg:mb-6 text-white drop-shadow-[0_0_10px_rgba(34,211,238,0.3)]">Carregando...</h1>
            <div class="w-20 h-1.5 bg-cyan-400 mb-8 rounded-full shadow-[0_0_10px_rgba(34,211,238,0.8)]"></div>
            <div class="flex-grow bg-[#0a0f1c]/60 backdrop-blur-xl border border-cyan-500/30 p-6 lg:p-8 rounded-2xl shadow-[0_0_20px_rgba(34,211,238,0.1)] flex flex-col justify-center">
                <p class="text-base md:text-lg lg:text-xl font-light leading-relaxed text-slate-300 whitespace-pre-wrap relative">
                    <span id="project-desc"></span><span class="animate-pulse inline-block w-[2px] h-[1em] bg-cyan-400 align-middle ml-1"></span>
                </p>
            </div>
        </div>

    </main>

    <script>
        // Recupera o projeto salvo na memória
        const projetoString = localStorage.getItem('projetoAtual');

        if (!projetoString) {
            // Se alguém tentar acessar a página direto sem clicar em um projeto, volta pro início
            window.location.href = 'index.html';
        } else {
            const projeto = JSON.parse(projetoString);
            
            // Preenche o título de imediato
            document.title = `${projeto.titulo} | Dantas`;
            document.getElementById('project-title').textContent = projeto.titulo;
            
            // Exibe o card de tecnologias dependendo do projeto
            const tituloProj = projeto.titulo.toLowerCase();
            if (tituloProj.includes('e-commerce') || tituloProj.includes('ecommerce')) {
                const techCard = document.getElementById('tech-stack-card');
                if (techCard) techCard.classList.remove('hidden');
                if (techCard) techCard.classList.add('flex');
            } else if (tituloProj.includes('linkedin') || tituloProj.includes('assistente')) {
                const techCardBot = document.getElementById('tech-stack-card-bot');
                if (techCardBot) techCardBot.classList.remove('hidden');
                if (techCardBot) techCardBot.classList.add('flex');
            }

            // --- LÓGICA DE ANIMAÇÃO DE DIGITAÇÃO (JS PURO) ---
            const descElement = document.getElementById('project-desc');
            const fullText = projeto.descricao;
            let charIndex = 0;
            
            const typingInterval = setInterval(() => {
                if (charIndex < fullText.length) {
                    descElement.textContent += fullText.charAt(charIndex);
                    charIndex++;
                } else {
                    clearInterval(typingInterval); // Para o intervalo quando acabar
                }
            }, 15); // Velocidade: 15 milissegundos (rápido o suficiente para textos longos)

            // Animação de entrada fluida (3D e Blur)
            setTimeout(() => {
                const mainContent = document.getElementById('main-content');
                if(mainContent) {
                    mainContent.classList.remove('opacity-0', 'translate-y-12', 'scale-95', 'blur-sm');
                    mainContent.classList.add('opacity-100', 'translate-y-0', 'scale-100', 'blur-0');
                }
            }, 100);
            
            // --- LÓGICA DE CARROSSEL PARA MÍDIA ---
            const midiaList = Array.isArray(projeto.midia) ? projeto.midia : [projeto.midia];
            window.currentMediaIndex = 0; // Agora a variável é global e acessível pelos botões HTML

            window.renderMedia = function(index) {
                window.currentMediaIndex = index;
                const mediaContainer = document.getElementById('project-media-container');
                mediaContainer.classList.add('relative', 'group');
                const midiaUrl = midiaList[index] ? midiaList[index].trim() : '';
                
                let mediaHtml = '';
                if (midiaUrl.match(/\.(mp4|webm|ogg|mov)([?#].*)?$/i)) {
                    mediaHtml = `<video src="${midiaUrl}" controls autoplay class="w-full h-full object-contain"></video>`;
                } else if (midiaUrl.match(/(youtube\.com\/watch\?.*v=|youtu\.be\/)([^&]+)/i)) {
                    const ytId = midiaUrl.match(/(youtube\.com\/watch\?.*v=|youtu\.be\/)([^&]+)/i)[2];
                    mediaHtml = `<iframe src="https://www.youtube.com/embed/${ytId}" class="w-full h-full" allowfullscreen></iframe>`;
                } else {
                    mediaHtml = `<img src="${midiaUrl}" alt="${projeto.titulo}" onerror="this.onerror=null; this.src='https://placehold.co/800x600?text=Foto+Invalida';" class="w-full h-full object-contain">`;
                }

                if (midiaList.length > 1) {
                    mediaHtml += `
                        <button onclick="renderMedia((window.currentMediaIndex - 1 + ${midiaList.length}) % ${midiaList.length})" class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-cyan-500 text-white w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full backdrop-blur-sm transition-all z-10 font-bold text-xl md:text-2xl opacity-100 lg:opacity-0 group-hover:opacity-100 shadow-lg">&#10094;</button>
                        <button onclick="renderMedia((window.currentMediaIndex + 1) % ${midiaList.length})" class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-cyan-500 text-white w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full backdrop-blur-sm transition-all z-10 font-bold text-xl md:text-2xl opacity-100 lg:opacity-0 group-hover:opacity-100 shadow-lg">&#10095;</button>
                        <div class="absolute bottom-4 flex gap-2 z-10 bg-black/30 px-3 py-2 rounded-full backdrop-blur-sm">
                            ${midiaList.map((_, i) => `<div class="w-2.5 h-2.5 md:w-3 md:h-3 rounded-full transition-colors ${i === index ? 'bg-cyan-400 shadow-[0_0_8px_rgba(34,211,238,0.8)]' : 'bg-white/50'}"></div>`).join('')}
                        </div>
                    `;
                }
                mediaContainer.innerHTML = mediaHtml;
            };
            renderMedia(window.currentMediaIndex);
        }

        // Mantém a preferência de Dark Mode
        const htmlElement = document.documentElement;
        // Se o usuário tinha definido um tema na outra página (opcional dependendo de como você gerencia o state global), ele pode ser lido aqui.
        // Como o default da sua tag HTML é class="dark", ele já inicia escuro.
    </script>
